<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather Agent</title>
  <script src="/config.js"></script>
  <script type="module">
    import {
      provideFluentDesignSystem,
      fluentButton,
      fluentTextField
    } from "https://unpkg.com/@fluentui/web-components?module";

    provideFluentDesignSystem().register(fluentButton(), fluentTextField());
  </script>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      color: #242424;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    #chat {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 24px 0;
    }

    .message {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #0078d4;
      color: white;
    }

    .agent {
      align-self: flex-start;
      background: white;
      border: 1px solid #ddd;
    }

    .status {
      margin-bottom: 8px;
      color: #616161;
      font-size: 13px;
    }

    .policy {
      display: none;
      margin-bottom: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid transparent;
    }

    .policy.allowed {
      display: block;
      color: #0f6c2f;
      background: #effaf2;
      border-color: #b7dfc2;
    }

    .policy.blocked {
      display: block;
      color: #a4262c;
      background: #fdf3f4;
      border-color: #f3b2b8;
    }

    .trace {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      color: #616161;
      font-size: 13px;
      white-space: normal;
    }

    .trace summary {
      cursor: pointer;
      color: #424242;
    }

    .trace ol {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .trace li {
      margin: 4px 0;
    }

    form {
      display: flex;
      gap: 8px;
    }

    fluent-text-field {
      flex: 1;
    }
  </style>
</head>
<body>
  <main>
    <h1>Weather Agent</h1>
    <div id="chat"></div>

    <form id="form">
      <fluent-text-field id="query" placeholder="Ask about the weather..." appearance="outline"></fluent-text-field>
      <fluent-button id="send" appearance="accent" type="submit">Send</fluent-button>
    </form>
  </main>

  <script>
    const apiBaseUrl = window.AGENT_API_BASE_URL || "";
    const chat = document.querySelector("#chat");
    const form = document.querySelector("#form");
    const queryInput = document.querySelector("#query");
    const sendButton = document.querySelector("#send");

    let currentStream;

    function addMessage(role, text = "") {
      const message = document.createElement("div");
      message.className = `message ${role}`;
      message.textContent = text;
      chat.appendChild(message);
      message.scrollIntoView({ behavior: "smooth", block: "end" });
      return message;
    }

    function addAgentMessage() {
      const message = addMessage("agent");
      const status = document.createElement("div");
      const policy = document.createElement("div");
      const answer = document.createElement("div");
      const trace = document.createElement("details");
      const traceSummary = document.createElement("summary");
      const traceSteps = document.createElement("ol");
      status.className = "status";
      policy.className = "policy";
      trace.className = "trace";
      traceSummary.textContent = "Agent steps";
      trace.append(traceSummary, traceSteps);
      message.append(status, policy, answer, trace);
      return { status, policy, answer, traceSteps };
    }

    function readEvent(event) {
      return JSON.parse(event.data);
    }

    function addTraceStep(agentMessage, text) {
      const item = document.createElement("li");
      item.textContent = text;
      agentMessage.traceSteps.appendChild(item);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const query = queryInput.value.trim();
      if (!query) {
        return;
      }

      if (currentStream) {
        currentStream.close();
      }

      addMessage("user", query);
      queryInput.value = "";
      sendButton.disabled = true;

      const agentMessage = addAgentMessage();
      let streamFinished = false;
      let answerStarted = false;
      let policyShown = false;
      currentStream = new EventSource(`${apiBaseUrl}/chat?query=${encodeURIComponent(query)}`);

      currentStream.addEventListener("status", (event) => {
        const status = readEvent(event).message;
        agentMessage.status.textContent = status;
        addTraceStep(agentMessage, status);
      });

      currentStream.addEventListener("tool_call", (event) => {
        const toolCall = readEvent(event);
        agentMessage.status.textContent = toolCall.message;
        addTraceStep(agentMessage, `Tool requested: ${toolCall.tool}`);
      });

      currentStream.addEventListener("tool_result", (event) => {
        const toolResult = readEvent(event);
        agentMessage.status.textContent = toolResult.message;
        addTraceStep(agentMessage, `Tool completed: ${toolResult.result}`);

        if (!policyShown && String(toolResult.result).includes("blocked by policy")) {
          policyShown = true;
          agentMessage.policy.className = "policy blocked";
          agentMessage.policy.textContent = toolResult.result;
          addTraceStep(agentMessage, toolResult.result);
        }
      });

      currentStream.addEventListener("policy", (event) => {
        const decision = readEvent(event);
        policyShown = true;
        agentMessage.policy.className = `policy ${decision.allowed ? "allowed" : "blocked"}`;
        agentMessage.policy.textContent = decision.allowed
          ? `Policy allowed: ${decision.matched_rule}`
          : `Policy blocked: ${decision.reason}`;
        addTraceStep(
          agentMessage,
          decision.allowed
            ? `Policy allowed: ${decision.matched_rule}`
            : `Policy blocked: ${decision.reason}`
        );
      });

      currentStream.addEventListener("message", (event) => {
        if (!answerStarted) {
          answerStarted = true;
          addTraceStep(agentMessage, "Started final response.");
        }
        agentMessage.answer.textContent += readEvent(event).text;
      });

      currentStream.addEventListener("done", () => {
        streamFinished = true;
        agentMessage.status.textContent = "";
        addTraceStep(agentMessage, "Completed.");
        currentStream.close();
        sendButton.disabled = false;
      });

      currentStream.addEventListener("error", () => {
        if (streamFinished) {
          return;
        }

        agentMessage.status.textContent = "The stream stopped unexpectedly.";
        addTraceStep(agentMessage, "Stream stopped unexpectedly.");
        currentStream.close();
        sendButton.disabled = false;
      });
    });
  </script>
</body>
</html>
